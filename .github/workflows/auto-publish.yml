name: Auto Publish Drafts

on:
  schedule:
    - cron: '0 1 * * 5'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Date and Publish
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          START_DATE="2026-05-01"
          END_DATE="2026-06-05"
          
          if [[ "$CURRENT_DATE" < "$START_DATE" || "$CURRENT_DATE" > "$END_DATE" ]]; then
            echo "Current date $CURRENT_DATE is outside the target range. Skipping."
            exit 0
          fi
          
          DRAFTS=$(ls _drafts/${CURRENT_DATE}-*.md 2>/dev/null || true)
          if [ -z "$DRAFTS" ]; then
            echo "No drafts found for $CURRENT_DATE."
            exit 0
          fi
          
          mkdir -p blog
          for draft in $DRAFTS; do
            filename=$(basename "$draft")
            post_dir="blog/${filename%.md}"
            mkdir -p "$post_dir"
            mv "$draft" "$post_dir/index.md"
          done
          
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Auto-publish drafts for $CURRENT_DATE"
          git push

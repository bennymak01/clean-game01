name: Auto Publish Drafts

# 每週一、四、五執行；發布所有檔名日期 <= 今天的草稿（追趕漏發，無截止日期）
on:
  schedule:
    - cron: '0 1 * * 1'   # 每週一 01:00 UTC
    - cron: '0 1 * * 4'   # 每週四 01:00 UTC
    - cron: '0 1 * * 5'   # 每週五 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Date and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)

          # Publish any draft dated today or earlier (catches up on drafts
          # missed by a skipped/failed run instead of leaving them stuck
          # forever - a fixed-date exact match previously left several
          # ready-to-publish drafts orphaned).
          DRAFTS=""
          for draft in _drafts/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-*.md; do
            [ -f "$draft" ] || continue
            filename=$(basename "$draft")
            draft_date="${filename:0:10}"
            if [[ "$draft_date" < "$CURRENT_DATE" || "$draft_date" == "$CURRENT_DATE" ]]; then
              DRAFTS="$DRAFTS $draft"
            fi
          done

          if [ -z "$DRAFTS" ]; then
            echo "No due drafts found as of $CURRENT_DATE."
            exit 0
          fi

          mkdir -p blog
          for draft in $DRAFTS; do
            filename=$(basename "$draft")
            post_dir="blog/${filename%.md}"
            mkdir -p "$post_dir"
            mv "$draft" "$post_dir/index.md"
            echo "Published: $draft → $post_dir/index.md"
          done

          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          BRANCH="auto-publish/${CURRENT_DATE}"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "Auto-publish drafts for $CURRENT_DATE"
          git push origin "$BRANCH"

          # Create PR via GitHub API
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "{\"title\":\"Auto-publish drafts for ${CURRENT_DATE}\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Automated draft publication for ${CURRENT_DATE}.\"}")

          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "Failed to create PR. Response: $PR_RESPONSE"
            exit 1
          fi
          echo "Created PR #${PR_NUMBER}"

          # Merge the PR via GitHub API
          MERGE_RESPONSE=$(curl -s -X PUT \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -d "{\"merge_method\":\"squash\",\"commit_title\":\"Auto-publish drafts for ${CURRENT_DATE}\"}")

          MERGED=$(echo "$MERGE_RESPONSE" | jq -r '.merged')
          if [ "$MERGED" != "true" ]; then
            echo "Merge failed. Response: $MERGE_RESPONSE"
            exit 1
          fi
          echo "Successfully merged PR #${PR_NUMBER} into main"

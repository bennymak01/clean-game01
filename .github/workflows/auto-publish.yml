name: Auto Publish Drafts

# 每週一、四各發布一篇：2026-06-15 起共6週（至 2026-07-23）
on:
  schedule:
    - cron: '0 1 * * 1'   # 每週一 01:00 UTC
    - cron: '0 1 * * 4'   # 每週四 01:00 UTC
    - cron: '0 1 * * 5'   # 每週五 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Date and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          START_DATE="2026-06-13"
          END_DATE="2026-07-23"

          if [[ "$CURRENT_DATE" < "$START_DATE" || "$CURRENT_DATE" > "$END_DATE" ]]; then
            echo "Current date $CURRENT_DATE is outside the target range ($START_DATE – $END_DATE). Skipping."
            exit 0
          fi

          DRAFTS=$(ls _drafts/${CURRENT_DATE}-*.md 2>/dev/null || true)
          if [ -z "$DRAFTS" ]; then
            echo "No drafts found for $CURRENT_DATE."
            exit 0
          fi

          mkdir -p blog
          for draft in $DRAFTS; do
            filename=$(basename "$draft")
            post_dir="blog/${filename%.md}"
            mkdir -p "$post_dir"
            mv "$draft" "$post_dir/index.md"
            echo "Published: $draft → $post_dir/index.md"
          done

          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          BRANCH="auto-publish/${CURRENT_DATE}"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "Auto-publish drafts for $CURRENT_DATE"
          git push origin "$BRANCH"

          # Create PR via GitHub API
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "{\"title\":\"Auto-publish drafts for ${CURRENT_DATE}\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Automated draft publication for ${CURRENT_DATE}.\"}")

          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "Failed to create PR. Response: $PR_RESPONSE"
            exit 1
          fi
          echo "Created PR #${PR_NUMBER}"

          # Merge the PR via GitHub API
          MERGE_RESPONSE=$(curl -s -X PUT \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -d "{\"merge_method\":\"squash\",\"commit_title\":\"Auto-publish drafts for ${CURRENT_DATE}\"}")

          MERGED=$(echo "$MERGE_RESPONSE" | jq -r '.merged')
          if [ "$MERGED" != "true" ]; then
            echo "Merge failed. Response: $MERGE_RESPONSE"
            exit 1
          fi
          echo "Successfully merged PR #${PR_NUMBER} into main"

name: SEO - Generate Blog Hero Image (Replicate / Nano Banana Pro)

on:
  workflow_dispatch:
    inputs:
      cluster_id:
        description: 'cluster_id row in seo/clean-com-hk-topical-cluster-plan.csv to record this image against'
        required: true
        type: string
      slug:
        description: 'Output filename stem -> images/blog/{slug}-hero.jpg'
        required: true
        type: string
      prompt:
        description: 'Full image prompt, including any Traditional Chinese title text to render on the image'
        required: true
        type: string
      aspect_ratio:
        description: 'Aspect ratio (default 16:9 for blog hero/OG image)'
        required: false
        type: string
        default: '16:9'
      resolution:
        description: 'Resolution: 1K, 2K, or 4K (default 2K)'
        required: false
        type: string
        default: '2K'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate image via Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          CLUSTER_ID: ${{ inputs.cluster_id }}
          SLUG: ${{ inputs.slug }}
          PROMPT: ${{ inputs.prompt }}
          ASPECT_RATIO: ${{ inputs.aspect_ratio }}
          RESOLUTION: ${{ inputs.resolution }}
        run: python3 seo/scripts/generate_hero_image.py

      - name: Convert to optimized JPEG
        run: |
          RAW="images/blog/${{ inputs.slug }}-hero-raw.png"
          FINAL="images/blog/${{ inputs.slug }}-hero.jpg"
          if [ -f "$RAW" ]; then
            convert "$RAW" -auto-orient -resize '1600x1600>' -quality 85 "$FINAL"
            rm -f "$RAW"
            echo "Saved $FINAL"
            ls -lh "$FINAL"
          else
            echo "No raw image produced - generation failed, see previous step logs."
          fi

      - name: Commit and open PR (main requires PRs, direct push is rejected)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "images/blog/${{ inputs.slug }}-hero.jpg" seo/clean-com-hk-topical-cluster-plan.csv

          if git diff --staged --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi

          RUN_ID="${{ github.run_id }}"
          BRANCH="seo/hero-image-${{ inputs.slug }}-${RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "chore(seo): generate hero image for ${{ inputs.slug }} (Replicate/Nano Banana Pro)"
          git push -u origin "$BRANCH"

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "{\"title\":\"seo: hero image for ${{ inputs.slug }} (run ${RUN_ID})\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"draft\":true,\"body\":\"Automated output of seo-generate-hero-image.yml for cluster_id=${{ inputs.cluster_id }}. Review the image before merging - re-run with a tweaked prompt if it needs a re-roll.\"}")

          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "Failed to create PR. Response: $PR_RESPONSE"
            exit 1
          fi
          echo "Created draft PR #${PR_NUMBER}"

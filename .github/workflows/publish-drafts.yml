name: Publish Scheduled Drafts

on:
  schedule:
    # 4月10日 早上 9:00 AM (HKT) = 1:00 AM (UTC)
    - cron: '0 1 10 4 *'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Move drafts to blog posts
        run: |
          # 建立目標資料夾（如果不存在）
          mkdir -p blog
          
          # 將所有 2026-04-10 開頭的草稿移至 blog 資料夾
          # 並將 .md 轉換為 .html (這裡假設您有轉換邏輯，或者直接發佈 md)
          # 為了簡單起見，我們直接移動並重新命名
          for file in _drafts/2026-04-10-*.md; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .md)
              # 這裡可以加入 Markdown 轉 HTML 的邏輯，或者直接發佈
              # 暫時先移動到 blog 資料夾
              mv "$file" "blog/${filename}.html"
            fi
          done

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Automatically publish scheduled blog posts for 2026-04-10"
          git push

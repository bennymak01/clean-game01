name: Auto-update Sitemap
on:
  schedule:
    - cron: '0 0 * * 0' # 每個星期日午夜執行一次
  push:
    branches: [main]
    paths:
      - '*.html'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write
  pull-requests: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate sitemap.xml
        run: |
          python3 - <<'PYEOF'
          import glob
          import os
          from datetime import date
          BASE_URL = "https://www.clean.com.hk"
          TODAY = date.today().isoformat()
          EXCLUDE = {
              "carpet_cleaning_game.html",
              "clock-learning-game.html",
              "cs-hub.html",
              "chishing_stationery.html",
              "fabric-calculator.html",
              "feng.html",
              "fengfeng.html",
              "header-preview.html",
              "pe_foam_calculator.html",
              "404.html",
          }
          def get_priority(filename):
              if filename == "index.html":
                  return "1.0"
              elif filename.startswith("blog-"):
                  return "0.7"
              else:
                  return "0.9"
          html_files = sorted([
              f for f in glob.glob("*.html")
              if os.path.basename(f) not in EXCLUDE
          ])
          lines = ['<?xml version="1.0" encoding="UTF-8"?>']
          lines.append('<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"')
          lines.append('        xmlns:xhtml="http://www.w3.org/1999/xhtml">')
          for f in html_files:
              slug = "" if f == "index.html" else f
              url = f"{BASE_URL}/{slug}"
              priority = get_priority(f)
              lines.append("")
              lines.append("  <url>")
              lines.append(f"    <loc>{url}</loc>")
              lines.append(f"    <lastmod>{TODAY}</lastmod>")
              lines.append(f"    <changefreq>monthly</changefreq>")
              lines.append(f"    <priority>{priority}</priority>")
              lines.append(f'    <xhtml:link rel="alternate" hreflang="zh-TW" href="{url}"/>')
              lines.append("  </url>")
          lines.append("")
          lines.append("</urlset>")
          lines.append("")
          content = "\n".join(lines)
          with open("sitemap.xml", "w", encoding="utf-8") as fh:
              fh.write(content)
          PYEOF

      - name: Create Pull Request for Sitemap Update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update sitemap.xml"
          title: "Auto-update sitemap.xml"
          body: "This is an automated PR to update the sitemap.xml based on the latest HTML files."
          branch: "auto-sitemap-update"
          delete-branch: true
          base: main

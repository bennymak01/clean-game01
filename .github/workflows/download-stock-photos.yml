name: Download Stock Photos

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/blog-images-embeds-y35k3l

      - name: Download Unsplash images
        run: |
          curl -fL "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1200&q=80" \
               -o images/blog/gym-equipment-cleaning-banner.jpg
          curl -fL "https://images.unsplash.com/photo-1628177142898-93e36e4e3a50?w=800&q=80" \
               -o images/blog/gym-deep-cleaning-disinfection.jpg
          curl -fL "https://images.unsplash.com/photo-1584744982491-665216d95f8b?w=800&q=80" \
               -o images/blog/gym-deep-cleaning-products.jpg
          curl -fL "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80" \
               -o images/blog/cleaning-professional-quality.jpg

      - name: Commit downloaded images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/blog/gym-equipment-cleaning-banner.jpg \
                  images/blog/gym-deep-cleaning-disinfection.jpg \
                  images/blog/gym-deep-cleaning-products.jpg \
                  images/blog/cleaning-professional-quality.jpg
          git diff --cached --quiet || git commit -m "chore: download Unsplash stock photos as local assets"
          git push

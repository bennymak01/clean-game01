name: SEO - DataForSEO Keyword Research

on:
  workflow_dispatch:  # Manual trigger only - each run costs DataForSEO API credits

jobs:
  keyword-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run DataForSEO keyword pull
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: python3 seo/scripts/dataforseo_keyword_pull.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seo/clean-com-hk-topical-cluster-plan.csv
          git diff --staged --quiet || git commit -m "chore(seo): pull DataForSEO search volume / difficulty / related keywords"
          git push
